---
caddy_blocks:
  - |
    {{ netbird.domain }} {
        # Native gRPC (needs HTTP/2 cleartext to backend)
        @grpc header Content-Type application/grpc*
        reverse_proxy @grpc h2c://127.0.0.1:{{ netbird.management_port }}

        # Combined server paths (relay, signal, management, OAuth2)
        @backend path /relay* /ws-proxy/* /api/* /oauth2/*
        reverse_proxy @backend 127.0.0.1:{{ netbird.management_port }}

        # Dashboard (everything else)
        reverse_proxy /* 127.0.0.1:{{ netbird.dashboard_port }}
    }

netbird:
  domain: "netbird.{{ home_domain }}"
  management_port: 8080
  dashboard_port: 8081
  stun_port: 3478
  relay_auth_secret: "{{ vault_netbird.relay_auth_secret }}"
  oidc_client_secret: "{{ vault_netbird.oidc_client_secret }}"
  database_encryption_key: "{{ vault_netbird.database_encryption_key }}"

inadyn_period: 600
inadyn_ddns_configurations:
  provider:
    - default@cloudflare.com:
        username: "{{ vault_home_domain }}"
        password: "{{ vault_cloudflare.zone_key }}"
        hostname: "netbird.{{ vault_home_domain }}"
